# INSTALL_DIR is set at runtime from the script location (sniper:5)
# These paths derive from it:
SNIPER_PRO="${INSTALL_DIR:-/usr/share/sniper}/pro.sh"
PLUGINS_DIR="${INSTALL_DIR:-/usr/share/sniper}/plugins"

# DEFAULT SETTINGS
ENABLE_AUTO_UPDATES="1"
REPORT="1"
LOOT="1"

# OUT OF SCOPE
OUT_OF_SCOPE=("www.sn1persecurity.com" "sn1persecurity.com" "*.sn1persecurity.com")

# SN1PER PROFESSIONAL SETTINGS
SNIPER_PRO_CONSOLE_OUTPUT="0"
SN1PER_AUTOLOAD="0"
MAX_HOSTS="2000"

# DEFAULT BROWSER
BROWSER="firefox"

# VULN SCAN MODE OVERRIDE
VULNSCAN="0"
