# Sn1per configuration — compat shim
# Sources the domain-split config files under conf/
# Backward-compatible with the existing sniper entrypoint that does "source /usr/share/sniper/sniper.conf"
# When loading via lib/bootstrap.sh, the color variables below are already set, so the
# conditional assignment ({:-}) is a no-op. When loading directly (old entrypoint path),
# these provide the color definitions that were historically part of sniper.conf.

OKBLUE=${OKBLUE:-'\033[94m'}
OKRED=${OKRED:-'\033[91m'}
OKGREEN=${OKGREEN:-'\033[92m'}
OKORANGE=${OKORANGE:-'\033[93m'}
RESET=${RESET:-'\e[0m'}
REGEX=${REGEX:-'^[0-9]+$'}

source "$(dirname "$(readlink -f "$0")")/conf/core.conf"
source "$(dirname "$(readlink -f "$0")")/conf/tools.conf"
source "$(dirname "$(readlink -f "$0")")/conf/integrations.conf"
source "$(dirname "$(readlink -f "$0")")/conf/plugins.conf"
source "$(dirname "$(readlink -f "$0")")/conf/detection.conf"
